<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Weave">
  <!-- Placeholder logo — a rising "W" drawn as an upward line chart. Swap with the real app icon when ready. -->
  <defs>
    <linearGradient id="bg" x1="24" y1="8" x2="232" y2="248" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#7C5CF0"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="hi" cx="0.3" cy="0.24" r="0.85">
      <stop stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="area" x1="0" y1="88" x2="0" y2="204" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="60" fill="url(#bg)"/>
  <rect width="256" height="256" rx="60" fill="url(#hi)"/>

  <path d="M52 158 L90 196 L128 128 L166 166 L206 92 L206 204 L52 204 Z" fill="url(#area)"/>

  <!-- soft glow behind the line -->
  <path d="M52 158 L90 196 L128 128 L166 166 L206 92" stroke="#ffffff" stroke-opacity="0.45" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- crisp line -->
  <path d="M52 158 L90 196 L128 128 L166 166 L206 92" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="52" cy="158" r="8" fill="#ffffff"/>
  <circle cx="90" cy="196" r="8" fill="#ffffff"/>
  <circle cx="128" cy="128" r="8" fill="#ffffff"/>
  <circle cx="166" cy="166" r="8" fill="#ffffff"/>
  <!-- endpoint pops with a halo -->
  <circle cx="206" cy="92" r="18" fill="#ffffff" fill-opacity="0.35" filter="url(#glow)"/>
  <circle cx="206" cy="92" r="11" fill="#ffffff"/>

  <!-- glassy inner edge -->
  <rect x="1" y="1" width="254" height="254" rx="59" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5"/>
</svg>
