<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Weave">
  <!-- Placeholder logo — a rising "W" drawn as an upward line chart. Swap with the real app icon when ready. -->
  <defs>
    <linearGradient id="bg" x1="24" y1="8" x2="232" y2="248" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#7C5CF0"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="hi" x1="128" y1="0" x2="128" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="70" x2="0" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="60" fill="url(#bg)"/>
  <rect width="256" height="256" rx="60" fill="url(#hi)"/>

  <!-- faint chart grid to fill the canvas -->
  <g stroke="#ffffff" stroke-opacity="0.09" stroke-width="1.6" stroke-linecap="round">
    <line x1="40" y1="74" x2="216" y2="74"/>
    <line x1="40" y1="118" x2="216" y2="118"/>
    <line x1="40" y1="162" x2="216" y2="162"/>
    <line x1="40" y1="206" x2="216" y2="206"/>
  </g>

  <path d="M44 150 L86 200 L128 116 L170 158 L212 68 L212 210 L44 210 Z" fill="url(#area)"/>

  <!-- soft glow behind the line -->
  <path d="M44 150 L86 200 L128 116 L170 158 L212 68" stroke="#ffffff" stroke-opacity="0.45" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- crisp line -->
  <path d="M44 150 L86 200 L128 116 L170 158 L212 68" stroke="#ffffff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="44" cy="150" r="8.5" fill="#ffffff"/>
  <circle cx="86" cy="200" r="8.5" fill="#ffffff"/>
  <circle cx="128" cy="116" r="8.5" fill="#ffffff"/>
  <circle cx="170" cy="158" r="8.5" fill="#ffffff"/>
  <!-- endpoint pops with a halo -->
  <circle cx="212" cy="68" r="19" fill="#ffffff" fill-opacity="0.35" filter="url(#glow)"/>
  <circle cx="212" cy="68" r="11.5" fill="#ffffff"/>

  <!-- glassy inner edge -->
  <rect x="1" y="1" width="254" height="254" rx="59" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5"/>
</svg>
